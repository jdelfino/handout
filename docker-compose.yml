# Simplest self-deploy: app + Postgres on one machine. `docker compose up` and
# go. Override IMAGE to point at your own build of the canonical image.
#
# Required env vars (set in .env or your shell):
#   SESSION_SECRET, GITHUB_APP_ID, GITHUB_APP_PRIVATE_KEY,
#   GITHUB_APP_CLIENT_ID, GITHUB_APP_CLIENT_SECRET, GITHUB_APP_WEBHOOK_SECRET
# See .env.example for the full list.

services:
  app:
    image: ${HANDOUT_IMAGE:-ghcr.io/jdelfino/handout:latest}
    ports:
      - "${PORT:-8080}:8080"
    environment:
      DATABASE_URL: postgres://handout:handout@postgres:5432/handout
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:8080}
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET must be set}
      GITHUB_APP_ID: ${GITHUB_APP_ID:?GITHUB_APP_ID must be set}
      GITHUB_APP_PRIVATE_KEY: ${GITHUB_APP_PRIVATE_KEY:?GITHUB_APP_PRIVATE_KEY must be set}
      GITHUB_APP_CLIENT_ID: ${GITHUB_APP_CLIENT_ID:?GITHUB_APP_CLIENT_ID must be set}
      GITHUB_APP_CLIENT_SECRET: ${GITHUB_APP_CLIENT_SECRET:?GITHUB_APP_CLIENT_SECRET must be set}
      GITHUB_APP_WEBHOOK_SECRET: ${GITHUB_APP_WEBHOOK_SECRET:?GITHUB_APP_WEBHOOK_SECRET must be set}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      RUN_MIGRATIONS_ON_STARTUP: "true"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: handout
      POSTGRES_PASSWORD: handout
      POSTGRES_DB: handout
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U handout"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  postgres-data:
